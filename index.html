function playerChannel(pid) {
  if (pid === DENI_ID) return "avdija_dedicated_email";
  if (ISRAELI_IDS.has(pid)) return "israeli_players_email";
  return "player_stats_email";
}
function computeEmailToggles(tracked) {
  let result = {avdija_dedicated_email:false, israeli_players_email:false, player_stats_email:false};
  tracked.forEach(pid => { result[playerChannel(pid)] = true; });
  return result;
}

    // Key format: "TeamName|||sport|||leagueId"
    function makeKey(name, sport, leagueId) { return `${name}|||${sport}|||${leagueId}`; }
    function parseKey(key) {
      const parts = key.split("|||");
      return { name: parts[0], sport: parts[1], leagueId: parts[2] };
    }

    function findLeagueById(leagueId, sport) {
      if (!DATA[sport]) return null;
      return DATA[sport].leagues.find(l => l.id === leagueId) || null;
    }

    function findLeagueIdByName(leagueName, sport) {
      if (!DATA[sport]) return "";
      return DATA[sport].leagues.find(l => l.name === leagueName)?.id || "";
    }

    // Normalize old "football" sport key → "soccer"
    function normalizeSport(sport) {
      return sport === "football" ? "soccer" : sport;
    }

                        {(authUser.displayName || authUser.email || "?")[0].toUpperCase()}

                  </button>
                  {showProfileDD && (
                    <>
                      <div className="fixed inset-0 z-30" onClick={() => setShowProfileDD(false)} />

                        <div className="px-3 py-2 border-b border-gray-100">
                          <p className="text-sm font-semibold text-gray-800 truncate">{authUser.displayName || 'User'}</p>
                          <p className="text-xs text-gray-400 truncate">{authUser.email}</p>
                        </div>
                                                <a href="https://docs.google.com/forms/d/e/1FAIpQLScFonSyA9hqJJGQPrg9llIkkQpY1Jgdx8sBRBEcayoqevaLvw/viewform" target="_blank" rel="noopener" className="block w-full text-left px-3 py-2 text-sm text-gray-600 hover:bg-gray-50 rounded-lg transition-colors" onClick={() => { if (typeof gtag === "function") gtag("event", "contact_click"); }}>
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{display:"inline",verticalAlign:"middle",marginRight:"4px"}}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Contact us
                        </a>
                        <a href="https://chat.whatsapp.com/CvTdxcgzCWBH2Pifds7odT" target="_blank" rel="noopener" className="w-full text-left px-3 py-2 text-sm text-gray-600 hover:bg-gray-50 rounded-lg transition-colors flex items-center gap-2" onClick={() => { if (typeof gtag === "function") gtag("event", "whatsapp_click", { event_category: "engagement", event_label: "profile_dropdown" }); }}>
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                          WhatsApp updates
                        </a>
                        <button onClick={() => { toggleEmailsPaused(); setShowProfileDD(false); }}
                          className="w-full text-left px-3 py-2 text-sm text-gray-600 hover:bg-gray-50 rounded-lg transition-colors flex items-center justify-between whitespace-nowrap">
                          <span>{emailsPaused ? "▶ Resume emails" : "⏸ Pause all emails"}</span>
                          <span className="text-xs px-1.5 py-0.5 rounded-full" style={{background: emailsPaused ? '#fef2f2' : '#f0fdf4', color: emailsPaused ? '#dc2626' : '#16a34a'}}>{emailsPaused ? "Paused" : "Active"}</span>
                        </button>
                        <div className="border-t border-gray-100 my-1"></div>
<button onClick={() => { setShowProfileDD(false); signOutUser(); }}
                          className="w-full text-left px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg mt-1 transition-colors">
                          Sign out
                        </button>
                      </div>
                    </>
                  )}
                </div>
              </div>

              


              {/* WhatsApp banner */}
              {userDocId && !whatsappDismissed && (
                <div className="mx-4 mb-3 p-3 rounded-xl border border-green-200 flex items-center gap-3" style={{background: "linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%)"}}>
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="#25D366" className="flex-shrink-0"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                  <span className="flex-1 text-sm font-medium text-gray-800">Join our WhatsApp group</span>
                  <a href="https://chat.whatsapp.com/CvTdxcgzCWBH2Pifds7odT" target="_blank" rel="noopener" className="px-3 py-1.5 text-xs font-medium text-white rounded-lg flex-shrink-0" style={{background: "#25D366"}} onClick={() => { if (typeof gtag === "function") gtag("event", "whatsapp_click", { event_category: "engagement", event_label: "banner" }); }}>Join</a>
                  <button onClick={() => { setWhatsappDismissed(true); if (db && userDocId) db.collection("users").doc(userDocId).update({ whatsapp_banner_dismissed: true }); }} className="text-gray-400 hover:text-gray-600 flex-shrink-0 ml-1" title="Dismiss">✕</button>
                </div>
              )}

              {/* Sport toggle */}
              <SportToggle sport={sport} isAdmin={isAdmin} onChange={s => { setSport(s); setSearchQuery(""); }} />
              {activeHint() === 'h1' && (
                <div className="bubble-arrow-up bubble-green mt-2 p-3 bg-emerald-50 border border-emerald-200 rounded-xl flex items-center gap-3">
                  <span className="text-lg">👇</span>
                  <p className="text-sm text-emerald-800 flex-1">{t('hint1')}</p>
                  <button onClick={() => dismissHint('h1')} className="text-emerald-400 hover:text-emerald-600 font-bold">✕</button>
                </div>
              )}
            </div>
          </header>

          {/* ────── Main Content ────── */}
          <main className="max-w-lg mx-auto px-4 pt-4 space-y-3">

            {loadStatus === "loading" && (
              <div className="text-center py-20 text-gray-400 text-sm">Loading your teams…</div>
            )}

            {loadStatus === "error" && (
              <div className="text-center py-20 text-red-400 text-sm">
                Could not load data. Check your Firebase config.
              </div>
            )}

            {loadStatus === "loaded" && (
              <>
                {activeHint() === 'h4' && (
                  <div className="mx-4 mb-3 p-3 bg-emerald-50 border border-emerald-200 rounded-xl flex items-center gap-3">
                    <span className="text-lg">✅</span>
                    <p className="text-sm text-emerald-800 flex-1">{t('hint4')}</p>
                    <button onClick={() => dismissHint('h4')} className="text-emerald-400 hover:text-emerald-600 font-bold">✕</button>
                  </div>
                )}
                {/* ────── Saved confirmation banner ────── */}
                {showWeeklyBanner && (
                <div className="bg-blue-50 border border-blue-200 rounded-2xl p-4 flex items-start gap-3">
                  <span className="text-lg leading-none mt-0.5">📅</span>
                  <p className="text-sm text-blue-800 leading-relaxed">
                    <span className="font-semibold">Weekly preview is on!</span>{" "}
                    You'll receive a weekly email with all your upcoming matches.
                  </p>
                </div>
              )}
              {showSavedBanner && (
                  <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-4 flex items-start gap-3">
                    <span className="text-lg leading-none mt-0.5">✅</span>
                    <p className="text-sm text-emerald-800 leading-relaxed">
                <span className="font-semibold">Preferences saved!</span>{" "}
                You'll receive a reminder at <span className="font-semibold">9:00 AM</span> on days you have a match, sent to{" "}
                <span className="font-semibold">{authUser.email}</span>.
              </p>
                  </div>
                )}

                {sport === "admin" && isAdmin ? (
                <AdminPanel db={db} />
              ) : sport === "players" ? (<>
                {activeHint() === 'h3' && (
                  <div className="bubble-arrow-down bubble-blue mb-2 p-3 bg-blue-50 border border-blue-200 rounded-xl flex items-center gap-3">
                    <span className="text-lg">📊</span>
                    <p className="text-sm text-blue-800 flex-1">{t('hint3')}</p>
                    <button onClick={() => dismissHint('h3')} className="text-blue-400 hover:text-blue-600 font-bold">✕</button>
                  </div>
                )}
              <PlayersPanel trackedPlayers={trackedPlayers} onTogglePlayer={togglePlayer}
                emailToggles={emailToggles}
                playerSearch={playerSearch} onSearchChange={setPlayerSearch} />
                {activeHint() === 'h5' && (
                  <div className="bubble-arrow-up bubble-purple mt-2 bg-purple-50 border border-purple-200 rounded-xl overflow-hidden">
                    <div className="p-3 flex items-center gap-3">
                      <span className="text-lg">🧠</span>
                      <p className="text-sm text-purple-800 flex-1">{t('hint5')}</p>
                      <button onClick={() => dismissHint('h5')} className="text-purple-400 hover:text-purple-600 font-bold">✕</button>
                    </div>
                    <div className="px-3 pb-3">
                      <button onClick={() => setShowHint5Detail(p => !p)} className="text-xs text-purple-500 hover:text-purple-700 flex items-center gap-1">
                        <span>{showHint5Detail ? '▲' : '▼'}</span> {t('hint5expand')}
                      </button>
                      {showHint5Detail && (
                        <div className="mt-2 text-xs text-purple-900">
                          <p className="mb-2">{t('hint5desc')}</p>
                          <table className="w-full text-xs border-collapse">
                            <thead><tr className="border-b border-purple-200">
                              <th className="py-1 text-left font-semibold">Email</th>
                              <th className="py-1 text-left font-semibold">{'Players'}</th>
                              <th className="py-1 text-left font-semibold">{'Active when'}</th>
                            </tr></thead>
                            <tbody>
                              <tr className="border-b border-purple-100"><td className="py-1 font-medium">{t('hint5deni')}</td><td className="py-1">{t('hint5deni')}</td><td className="py-1">{t('hint5deniWhen')}</td></tr>
                              <tr className="border-b border-purple-100"><td className="py-1 font-medium">Israeli Players</td><td className="py-1">{t('hint5israeli')}</td><td className="py-1">{t('hint5israeliWhen')}</td></tr>
                              <tr><td className="py-1 font-medium">General Stats</td><td className="py-1">{t('hint5general')}</td><td className="py-1">{t('hint5generalWhen')}</td></tr>
                            </tbody>
                          </table>
                          <p className="mt-2 text-purple-600 bg-purple-100 rounded-lg p-2">{t('hint5note')}</p>
                        </div>
                      )}
                    </div>
                  </div>
                )}
            </>) : (<>
            {emailsPaused && (
              <div className="mb-3 p-3 bg-red-50 border border-red-200 rounded-xl flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <span className="text-red-500 text-lg">⏸️</span>
                  <span className="text-sm text-red-700 font-medium">All emails are paused</span>
                </div>
                <button onClick={toggleEmailsPaused}
                  className="text-xs bg-red-500 text-white px-3 py-1 rounded-lg hover:bg-red-600 transition-colors">
                  Resume
                </button>
              </div>
            )}
            {/* My Teams */}
            <div>
              <div className="flex items-center justify-between px-1 mb-2">
                <h2 className="text-xs font-semibold text-gray-400 uppercase tracking-wider">My Teams</h2>
                <div className="flex items-center gap-2">
                  <span className="text-xs text-gray-500">📅 Weekly preview</span>
                  <button onClick={toggleWeeklyDigest}
                    className={`relative w-11 h-6 rounded-full transition-all ${weeklyDigest ? "bg-blue-500" : "bg-gray-300"}`}>
                    <span className={`absolute top-0.5 ${weeklyDigest ? "left-[22px]" : "left-0.5"} w-5 h-5 bg-white rounded-full shadow transition-all`} />
                  </button>
                </div>
              </div>
                {activeHint() === 'h2' && (
                  <div className="bubble-arrow-up bubble-purple mt-1 mb-2 p-3 bg-purple-50 border border-purple-200 rounded-xl flex items-center gap-3">
                    <span className="text-lg">📅</span>
                    <p className="text-sm text-purple-800 flex-1">{t('hint2')}</p>
                    <button onClick={() => dismissHint('h2')} className="text-purple-400 hover:text-purple-600 font-bold">✕</button>
                  </div>
                )}
              <MyTeamsPanel selectedTeams={selectedTeams} onRemove={toggleTeam}
                    avdiaStats={avdiaStats} onToggleAvdiaStats={toggleAvdiaStats}
                    weeklyDigest={weeklyDigest} onToggleWeeklyDigest={toggleWeeklyDigest}
                  worldCupMode={worldCupMode} />
                </div>

                {/* Search */}
                <div className="relative">
                  <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm">🔍</span>
                  <input ref={searchRef} type="search" placeholder="Search teams…"
                    value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                    className={`w-full pl-9 pr-10 py-3 bg-white border border-gray-200 rounded-xl text-sm
                      focus:outline-none focus:ring-2 ${accent.ring} focus:border-transparent
                      placeholder:text-gray-400`} />
                  {searchQuery && (
                    <button onClick={() => setSearchQuery("")}
                      className="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg font-light">
                      ×
                    </button>
                  )}
                </div>

                {/* Leagues */}
                <div>
                  <h2 className="text-xs font-semibold text-gray-400 uppercase tracking-wider px-1 mb-2">
                    {DATA[sport].emoji} {DATA[sport].label} Leagues
                  </h2>
                  {!hasSearchResults ? (
                    <div className="text-center py-10 text-gray-400 text-sm">
                      No teams found for "{searchQuery}"
                    </div>
                  ) : (
                    <div className="space-y-2">
                      {filteredLeagues.map(league => (
                        <LeagueSection key={league.id} league={league} sport={sport}
                          selectedTeams={selectedTeams} onToggle={toggleTeam}
                          forceOpen={!!searchQuery && (!league._filtered || league._filtered.length > 0)} />
                      ))}
                    </div>
                  )}
                </div>
              </>)}
            </>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
