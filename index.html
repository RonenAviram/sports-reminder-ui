    function App() {

      // World Cup mode: auto-ON until day after final (July 20, 2026)
const worldCupMode = new Date() <= new Date("2026-07-20T23:59:59");
      const [showWeeklyBanner, setShowWeeklyBanner] = useState(false);
      const searchRef = useRef(null);
const [playerSearch, setPlayerSearch] = useState("");
const [trackedPlayers, setTrackedPlayers] = useState(new Set());
const [emailToggles, setEmailToggles] = useState({avdija_dedicated_email:false,israeli_players_email:false,player_stats_email:false});
      const [showProfileDD, setShowProfileDD] = useState(false);

      // в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ Load from Firebase в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      useEffect(() => {
        if (!IS_CONFIGURED || !userDocId) { setLoadStatus("loaded"); return; }
        db.collection("users").doc(userDocId).get()
          .then(doc => {
            if (!doc.exists) {
              return db.collection("users").doc(userDocId).set({
                email: authUser.email,

                status: 'active',

              }).then(function() { setLoadStatus("loaded"); });
            }
            if (doc.exists) {
              const data = doc.data();
              const teams = (data.teams || []).map(t => {
                // Backward-compat: old docs used sport:"football", new uses "soccer"
                const sport    = normalizeSport(t.sport);
                const leagueId = t.leagueId || findLeagueIdByName(t.league, sport) || "";
                return makeKey(t.name, sport, leagueId);
              });
              setSelectedTeams(new Set(teams));
              if (data.avdija_stats !== undefined) setAvdiaStats(data.avdija_stats);
          if (data.weekly_digest !== undefined) setWeeklyDigest(data.weekly_digest);
            // world_cup_mode auto-calculated, sync to Firestore
const autoWC = new Date() <= new Date("2026-07-20T23:59:59");
if (data.world_cup_mode !== autoWC) { db.collection("users").doc(userDocId).update({world_cup_mode: autoWC}); }
              if (data.tracked_players) {
                const enabled = Object.entries(data.tracked_players).filter(([k,v]) => v.enabled).map(([k]) => k);
                setTrackedPlayers(new Set(enabled));
              }
              if (data.avdija_dedicated_email !== undefined) setEmailToggles(prev => ({...prev, avdija_dedicated_email: data.avdija_dedicated_email}));
              if (data.israeli_players_email !== undefined) setEmailToggles(prev => ({...prev, israeli_players_email: data.israeli_players_email}));
              if (data.player_stats_email !== undefined) setEmailToggles(prev => ({...prev, player_stats_email: data.player_stats_email}));
            }
            setLoadStatus("loaded");
          })

      }, [userDocId]);

      const toggleTeam = useCallback((name, sport, leagueId) => {
        setSelectedTeams(prev => {
          const next = new Set(prev);
          const k = makeKey(name, sport, leagueId);
          next.has(k) ? next.delete(k) : next.add(k);

      const toggleAvdiaStats = useCallback(async () => {
        const newVal = !avdiaStats;

        if (!IS_CONFIGURED) return;
        try {
          await db.collection("users").doc(userDocId).update({
            avdija_stats: newVal

          setAvdiaStats(!newVal); // revert on error
        }
      }, [avdiaStats]);

      // в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ Toggle Weekly Digest (auto-saves immediately) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const toggleWeeklyDigest = useCallback(async () => {
    const newVal = !weeklyDigest;
    setWeeklyDigest(newVal);
    if (!IS_CONFIGURED) return;
    try {
      await db.collection("users").doc(userDocId).update({ weekly_digest: newVal });
      if (newVal) { setShowWeeklyBanner(true); setTimeout(() => setShowWeeklyBanner(false), 5000); }
    } catch {
      setWeeklyDigest(!newVal);
    }
  }, [weeklyDigest]);

      

  const togglePlayer = useCallback(async (playerId) => {
    const newEnabled = !trackedPlayers.has(playerId);
    const newSet = new Set(trackedPlayers);
    newEnabled ? newSet.add(playerId) : newSet.delete(playerId);
    setTrackedPlayers(newSet);
    // Auto-compute email toggles
    const newToggles = computeEmailToggles(newSet);
    setEmailToggles(newToggles);
    if (!IS_CONFIGURED || !userDocId) return;
    try {
      await db.collection("users").doc(userDocId).update({
        tracked_players: Object.fromEntries([...newSet].map(pid => [pid, {enabled:true}])),
        ...newToggles
      });
    } catch(e) {
      // revert on error
      setTrackedPlayers(trackedPlayers);
      setEmailToggles(computeEmailToggles(trackedPlayers));
    }
  }, [trackedPlayers]

    // в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ Save to Firebase в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      const handleSave = async () => {
        if (!IS_CONFIGURED || saveStatus === "saving") return;
        setSaveStatus("saving");
        const teams = [...selectedTeams].map(key => {
          const { name, sport, leagueId } = parseKey(key);
          const league = findLeagueById(leagueId, sport);
          return { name, sport, leagueId, league: league?.name || "" };
        });
        try {
          await db.collection("users").doc(userDocId).set({
            reminder_email:        authUser.email,
            timezone_offset_hours: TIMEZONE_OFFSET,
            teams,
            avdija_stats:          avdiaStats,
          weekly_digest:         weeklyDigest,
            world_cup_mode:        worldCupMode,
            updatedAt: new Date().toISOString()
          }, {merge: true});
          setSaveStatus("saved");
          setHasUnsaved(false);
          setShowSavedBanner(true);
          setTimeout(() => setSaveStatus("idle"), 2500);
        } catch {
          setSaveStatus("error");
        }
      };

      // в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ Filter leagues by search в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      const filteredLeagues = useMemo(() => {
    if (sport === "players") return [];
        const q = searchQuery.trim().toLowerCase();
        return DATA[sport].leagues.map(league => ({
          ...league,
          _filtered: q ? league.teams.filter(t => t.toLowerCase().includes(q)) : null
        }));
      }, [sport, searchQuery]);

      const hasSearchResults = filteredLeagues.some(l => !l._filtered || l._filtered.length > 0);

            // Auth guard (after all hooks)
      if (authLoading) return <div className="min-h-screen bg-slate-900 flex items-center justify-center"><div className="text-white text-sm">Loading...</div></div>;
      if (!authUser) return <LoginScreen />;

      if (!IS_CONFIGURED) return <SetupScreen />;

      const accent = sport === "players" ? {bg:"bg-blue-500",bgLight:"bg-blue-50",border:"border-blue-200",text:"text-blue-600",badge:"bg-blue-100 text-blue-700",ring:"focus:ring-blue-300",hover:"hover:bg-blue-600"} : DATA[sport].accent;

      return (
        <div className="min-h-screen bg-gray-50 pb-8">

          {/* в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ Sticky Header в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */}
          <header className="bg-slate-900 sticky top-0 z-20 shadow-xl">
            <div className="max-w-lg mx-auto px-4 pt-4 pb-3 space-y-3">

              {/* Title row */}
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <span className="text-xl">рџЏџпёЏ</span>
                  <h1 className="text-white font-bold text-lg tracking-tight">Sports Reminder</h1>
                  
                </div>
                <button onClick={handleSave}
                  disabled={saveStatus === "saving" || !hasUnsaved}
                  className={`px-4 py-1.5 rounded-xl text-sm font-semibold transition-all ${
                    saveStatus === "saved"
                      ? "bg-emerald-500 text-white"
                      : saveStatus === "error"
                      ? "bg-red-500 text-white"
                      : saveStatus === "saving"
                      ? "bg-slate-600 text-slate-400 cursor-not-allowed"
                      : hasUnsaved
                      ? "bg-blue-500 hover:bg-blue-400 text-white"
                      : "bg-slate-700 text-slate-500 cursor-not-allowed"
                  }`}>
                  {saveStatus === "saving" ? "SavingвЂ¦"
                    : saveStatus === "saved" ? "вњ“ Saved"
                    : saveStatus === "error" ? "вљ  Error"
                    : "Save"}
                </button>
                <div className="relative flex items-center ml-2">
                  <button onClick={() => setShowProfileDD(p => !p)} className="flex items-center gap-1.5 rounded-full hover:ring-2 hover:ring-slate-500 transition-all focus:outline-none">
                    {authUser.photoURL ? (
                      <img src={authUser.photoURL} alt="" className="w-7 h-7 rounded-full border border-slate-600" referrerPolicy="no-referrer" />
                    ) : (
                      <div className="w-7 h-7 rounded-full bg-slate-600 flex items-center justify-center text-white text-xs font-bold">
                        {(authUser.displayName || authUser.email || "?")[0].toUpperCase()}
                      </div>
                    )}
                  </button>
                  {showProfileDD && (
                    <>
                      <div className="fixed inset-0 z-30" onClick={() => setShowProfileDD(false)} />
                      <div className="absolute right-0 top-10 z-40 bg-white rounded-xl shadow-lg border border-gray-200 py-2 px-1 min-w-[180px]">
                        <div className="px-3 py-2 border-b border-gray-100">
                          <p className="text-sm font-semibold text-gray-800 truncate">{authUser.displayName || 'User'}</p>
                          <p className="text-xs text-gray-400 truncate">{authUser.email}</p>
                        </div>
                        <button onClick={() => { setShowProfileDD(false); signOutUser(); }}
                          className="w-full text-left px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg mt-1 transition-colors">
                          Sign out
                        </button>
                      </div>
                    </>
                  )}
                </div>
              </div>

              {/* Sport toggle */}
              <SportToggle sport={sport} onChange={s => { setSport(s); setSearchQuery(""); }} />
            </div>
          </header>

          {/* в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ Main Content в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */}
          <main className="max-w-lg mx-auto px-4 pt-4 space-y-3">

            {loadStatus === "loading" && (
              <div className="text-center py-20 text-gray-400 text-sm">Loading your teamsвЂ¦</div>
            )}

            {loadStatus === "error" && (
              <div className="text-center py-20 text-red-400 text-sm">
                Could not load data. Check your Firebase config.
              </div>
            )}

            {loadStatus === "loaded" && (
              <>
                {/* в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ Saved confirmation banner в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */}
                {showWeeklyBanner && (
                <div className="bg-blue-50 border border-blue-200 rounded-2xl p-4 flex items-start gap-3">
                  <span className="text-lg leading-none mt-0.5">рџ“…</span>
                  <p className="text-sm text-blue-800 leading-relaxed">
                    <span className="font-semibold">Weekly preview is on!</span>{" "}
                    You'll receive a weekly email with all your upcoming matches.
                  </p>
                </div>
              )}
              {showSavedBanner && (
                  <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-4 flex items-start gap-3">
                    <span className="text-lg leading-none mt-0.5">вњ…</span>
                    <p className="text-sm text-emerald-800 leading-relaxed">
                <span className="font-semibold">Preferences saved!</span>{" "}
                You'll receive a reminder at <span className="font-semibold">9:00 AM</span> on days you have a match, sent to{" "}
                <span className="font-semibold">{authUser.email}</span>.
              </p>
                  </div>
                )}

                {sport === "players" ? (
              <PlayersPanel trackedPlayers={trackedPlayers} onTogglePlayer={togglePlayer}
                emailToggles={emailToggles}
                playerSearch={playerSearch} onSearchChange={setPlayerSearch} />
            ) : (<>
            {/* My Teams */}
            <div>
              <div className="flex items-center justify-between px-1 mb-2">
                <h2 className="text-xs font-semibold text-gray-400 uppercase tracking-wider">My Teams</h2>
                <div className="flex items-center gap-2">
                  <span className="text-xs text-gray-500">рџ“… Weekly preview</span>
                  <button onClick={toggleWeeklyDigest}
                    className={`relative w-11 h-6 rounded-full transition-all ${weeklyDigest ? "bg-blue-500" : "bg-gray-300"}`}>
                    <span className={`absolute top-0.5 ${weeklyDigest ? "left-[22px]" : "left-0.5"} w-5 h-5 bg-white rounded-full shadow transition-all`} />
                  </button>
                </div>
              </div>
              <MyTeamsPanel selectedTeams={selectedTeams} onRemove={toggleTeam}
                    avdiaStats={avdiaStats} onToggleAvdiaStats={toggleAvdiaStats}
                    weeklyDigest={weeklyDigest} onToggleWeeklyDigest={toggleWeeklyDigest}
                  worldCupMode={worldCupMode} />
                </div>

                {/* Search */}
                <div className="relative">
                  <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm">рџ”Ќ</span>
                  <input ref={searchRef} type="search" placeholder="Search teamsвЂ¦"
                    value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                    className={`w-full pl-9 pr-10 py-3 bg-white border border-gray-200 rounded-xl text-sm
                      focus:outline-none focus:ring-2 ${accent.ring} focus:border-transparent
                      placeholder:text-gray-400`} />
                  {searchQuery && (
                    <button onClick={() => setSearchQuery("")}
                      className="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg font-light">
                      Г—
                    </button>
                  )}
                </div>

                {/* Leagues */}
                <div>
                  <h2 className="text-xs font-semibold text-gray-400 uppercase tracking-wider px-1 mb-2">
                    {DATA[sport].emoji} {DATA[sport].label} Leagues
                  </h2>
                  {!hasSearchResults ? (
                    <div className="text-center py-10 text-gray-400 text-sm">
                      No teams found for "{searchQuery}"
                    </div>
                  ) : (
                    <div className="space-y-2">
                      {filteredLeagues.map(league => (
                        <LeagueSection key={league.id} league={league} sport={sport}
                          selectedTeams={selectedTeams} onToggle={toggleTeam}
                          forceOpen={!!searchQuery && (!league._filtered || league._filtered.length > 0)} />
                      ))}
                    </div>
                  )}
                </div>
              </>)}
            </>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
