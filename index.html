<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sports Reminder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    .pill-btn { transition: all 0.12s ease; }
    .pill-btn:active { transform: scale(0.94); }
    .league-arrow { transition: transform 0.2s ease; }
    .league-arrow.open { transform: rotate(180deg); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // ─────────────────────────────────────────────────────────────────────────
    // FIREBASE CONFIG — fill in your values, then deploy to Vercel
    // ─────────────────────────────────────────────────────────────────────────
    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyCd3C1_XN69r8lWUBYPndoGFxmDjnsjX1E",
      authDomain:        "sports-reminder-55578.firebaseapp.com",
      projectId:         "sports-reminder-55578",
      storageBucket:     "sports-reminder-55578.firebasestorage.app",
      messagingSenderId: "953308585577",
      appId:             "1:953308585577:web:3d7079049fc61ec1f08cf8"
    };
    const FIRESTORE_DOC = "ronen";   // Firestore document ID inside /configs/
    const REMINDER_EMAIL = "ronen6213@gmail.com";
    const TIMEZONE_OFFSET = 3;       // Israel summer (UTC+3)

    const IS_CONFIGURED = !FIREBASE_CONFIG.apiKey.includes("YOUR_");
    let db = null;
    if (IS_CONFIGURED) {
      const fbApp = firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.firestore(fbApp);
    }

    // ─────────────────────────────────────────────────────────────────────────
    // SPORTS DATA
    // ─────────────────────────────────────────────────────────────────────────
    const DATA = {
      football: {
        label: "Football",
        emoji: "⚽",
        accent: { bg: "bg-emerald-600", bgLight: "bg-emerald-50", border: "border-emerald-200",
                  text: "text-emerald-700", badge: "bg-emerald-100 text-emerald-700",
                  ring: "focus:ring-emerald-300", hover: "hover:bg-emerald-700" },
        leagues: [
          {
            id: "premier_league", name: "Premier League", country: "England", flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿",
            teams: ["Arsenal","Aston Villa","Bournemouth","Brentford","Brighton & Hove Albion",
                    "Chelsea","Crystal Palace","Everton","Fulham","Ipswich Town","Leicester City",
                    "Liverpool","Manchester City","Manchester United","Newcastle United",
                    "Nottingham Forest","Southampton","Tottenham Hotspur","West Ham United",
                    "Wolverhampton Wanderers"]
          },
          {
            id: "la_liga", name: "La Liga", country: "Spain", flag: "🇪🇸",
            teams: ["Real Madrid","FC Barcelona","Atletico Madrid","Sevilla FC","Real Betis",
                    "Valencia CF","Athletic Club","Real Sociedad","Villarreal CF","RC Celta",
                    "Getafe CF","RCD Mallorca","CA Osasuna","Rayo Vallecano","UD Las Palmas",
                    "Girona FC","Deportivo Alaves","CD Leganes","RCD Espanyol","Real Valladolid"]
          },
          {
            id: "bundesliga", name: "Bundesliga", country: "Germany", flag: "🇩🇪",
            teams: ["Bayern Munich","Borussia Dortmund","RB Leipzig","Bayer Leverkusen",
                    "Eintracht Frankfurt","VfB Stuttgart","SC Freiburg","1. FC Union Berlin",
                    "FC Augsburg","TSG Hoffenheim","Borussia Monchengladbach","FSV Mainz 05",
                    "VfL Wolfsburg","Werder Bremen","FC Heidenheim","Holstein Kiel",
                    "FC St. Pauli","VfL Bochum"]
          },
          {
            id: "serie_a", name: "Serie A", country: "Italy", flag: "🇮🇹",
            teams: ["Inter Milan","AC Milan","Juventus","Atalanta","Bologna FC","AS Roma",
                    "SS Lazio","Fiorentina","Torino FC","Napoli","Udinese","Genoa","Cagliari",
                    "Hellas Verona","Lecce","Empoli","Venezia","Parma","Como","Monza"]
          },
          {
            id: "ligue_1", name: "Ligue 1", country: "France", flag: "🇫🇷",
            teams: ["Paris Saint-Germain","Marseille","Monaco","Lyon","Lille","Nice","Rennes",
                    "Lens","Strasbourg","Nantes","Brest","Reims","Montpellier","Toulouse",
                    "Le Havre","Auxerre","Angers","Saint-Etienne"]
          },
          {
            id: "israeli_pl_football", name: "Israeli Premier League", country: "Israel", flag: "🇮🇱",
            teams: ["Maccabi Tel Aviv","Hapoel Tel Aviv","Maccabi Haifa","Beitar Jerusalem",
                    "Hapoel Beer Sheva","Maccabi Petah Tikva","Bnei Yehuda","Maccabi Netanya",
                    "Hapoel Jerusalem","Hapoel Haifa","Hapoel Hadera","FC Ashdod",
                    "Hapoel Raanana","Ironi Kiryat Shmona","Bnei Sakhnin","Maccabi Bnei Raina"]
          },
          {
            id: "mls", name: "MLS", country: "USA", flag: "🇺🇸",
            teams: ["Atlanta United","Austin FC","Charlotte FC","Chicago Fire","Colorado Rapids",
                    "Columbus Crew","DC United","FC Cincinnati","FC Dallas","Houston Dynamo",
                    "Inter Miami","LA Galaxy","Los Angeles FC","Minnesota United","CF Montreal",
                    "Nashville SC","New England Revolution","New York City FC","New York Red Bulls",
                    "Orlando City","Philadelphia Union","Portland Timbers","Real Salt Lake",
                    "San Jose Earthquakes","Seattle Sounders","Sporting Kansas City",
                    "St. Louis City","Toronto FC","Vancouver Whitecaps","San Diego FC"]
          }
        ]
      },
      basketball: {
        label: "Basketball",
        emoji: "🏀",
        accent: { bg: "bg-orange-500", bgLight: "bg-orange-50", border: "border-orange-200",
                  text: "text-orange-600", badge: "bg-orange-100 text-orange-700",
                  ring: "focus:ring-orange-300", hover: "hover:bg-orange-600" },
        leagues: [
          {
            id: "euroleague", name: "EuroLeague", country: "Europe", flag: "🌍",
            teams: ["Real Madrid","FC Barcelona","Maccabi Tel Aviv","Olympiacos","Panathinaikos",
                    "Fenerbahce Beko","Anadolu Efes","Bayern Munich","ALBA Berlin",
                    "Virtus Bologna","Olimpia Milano","Monaco Basket","Partizan Belgrade",
                    "ASVEL","Valencia Basket","Baskonia","Zalgiris","Paris Basketball"]
          },
          {
            id: "eurocup", name: "EuroCup", country: "Europe", flag: "🌍",
            teams: ["Hapoel Jerusalem","Hapoel Tel Aviv","Joventut Badalona","Unicaja Malaga",
                    "Gran Canaria","Lietkabelis","Bourg-en-Bresse","Wurzburg Baskets",
                    "Umana Reyer Venice","Prometey","Buducnost","Cedevita Olimpija",
                    "Dolomiti Energia Trento","Ratiopharm Ulm","Zaragoza","Tofas Bursa"]
          },
          {
            id: "israeli_pl_basketball", name: "Israeli Premier League", country: "Israel", flag: "🇮🇱",
            teams: ["Maccabi Tel Aviv","Hapoel Jerusalem","Hapoel Tel Aviv","Maccabi Rishon LeZion",
                    "Ironi Ness Ziona","Hapoel Holon","Maccabi Ashdod","Hapoel Eilat",
                    "Bnei Herzliya","Hapoel Galil Elyon","Maccabi Haifa","Elitzur Ramla"]
          },
          {
            id: "nba", name: "NBA", country: "USA", flag: "🇺🇸",
            teams: ["Atlanta Hawks","Boston Celtics","Brooklyn Nets","Charlotte Hornets",
                    "Chicago Bulls","Cleveland Cavaliers","Dallas Mavericks","Denver Nuggets",
                    "Detroit Pistons","Golden State Warriors","Houston Rockets","Indiana Pacers",
                    "LA Clippers","Los Angeles Lakers","Memphis Grizzlies","Miami Heat",
                    "Milwaukee Bucks","Minnesota Timberwolves","New Orleans Pelicans",
                    "New York Knicks","Oklahoma City Thunder","Orlando Magic",
                    "Philadelphia 76ers","Phoenix Suns","Portland Trail Blazers",
                    "Sacramento Kings","San Antonio Spurs","Toronto Raptors","Utah Jazz",
                    "Washington Wizards"]
          }
        ]
      }
    };

    // ─────────────────────────────────────────────────────────────────────────
    // HELPERS
    // ─────────────────────────────────────────────────────────────────────────
    function makeKey(name, sport) { return `${name}|||${sport}`; }
    function parseKey(key) { const [name, sport] = key.split("|||"); return { name, sport }; }

    function findLeague(teamName, sport) {
      for (const league of DATA[sport].leagues) {
        if (league.teams.includes(teamName)) return league.name;
      }
      return "";
    }

    // ─────────────────────────────────────────────────────────────────────────
    // COMPONENTS
    // ─────────────────────────────────────────────────────────────────────────

    function SportToggle({ sport, onChange }) {
      return (
        <div className="flex gap-1.5 p-1 bg-slate-800 rounded-xl">
          {["football","basketball"].map(s => {
            const active = sport === s;
            const d = DATA[s];
            return (
              <button key={s} onClick={() => onChange(s)}
                className={`flex-1 flex items-center justify-center gap-2 py-2 px-3 rounded-lg text-sm font-semibold transition-all ${
                  active ? `bg-white ${d.accent.text}` : "text-slate-400 hover:text-slate-200"
                }`}>
                <span>{d.emoji}</span>
                <span>{d.label}</span>
              </button>
            );
          })}
        </div>
      );
    }

    function TeamPill({ name, selected, sport, onToggle }) {
      const { accent } = DATA[sport];
      return (
        <button onClick={onToggle}
          className={`pill-btn inline-flex items-center gap-1 px-3 py-1.5 rounded-full text-sm font-medium border transition-all ${
            selected
              ? `${accent.bg} border-transparent text-white shadow-sm`
              : "bg-white border-gray-200 text-gray-700 hover:border-gray-400 hover:shadow-sm"
          }`}>
          {selected && <span className="text-xs">✓</span>}
          {name}
        </button>
      );
    }

    function LeagueSection({ league, sport, selectedTeams, onToggle, forceOpen }) {
      const [open, setOpen] = useState(false);
      const { accent } = DATA[sport];

      const visibleTeams = useMemo(() => league._filtered ?? league.teams, [league]);
      const selectedCount = useMemo(
        () => visibleTeams.filter(t => selectedTeams.has(makeKey(t, sport))).length,
        [visibleTeams, selectedTeams, sport]
      );

      useEffect(() => {
        if (forceOpen) setOpen(true);
        else if (!forceOpen && open) setOpen(false);
      }, [forceOpen]);

      if (league._filtered && league._filtered.length === 0) return null;

      return (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <button onClick={() => setOpen(o => !o)}
            className="w-full flex items-center justify-between p-4 text-left hover:bg-gray-50 active:bg-gray-100 transition-colors">
            <div className="flex items-center gap-3">
              <span className="text-2xl leading-none">{league.flag}</span>
              <div>
                <div className="font-semibold text-gray-900 text-sm">{league.name}</div>
                <div className="text-xs text-gray-400 mt-0.5">{league.country} · {league.teams.length} teams</div>
              </div>
            </div>
            <div className="flex items-center gap-2 flex-shrink-0">
              {selectedCount > 0 && (
                <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${accent.badge}`}>
                  {selectedCount}
                </span>
              )}
              <span className={`league-arrow text-gray-400 text-xs ${open ? "open" : ""}`}>▼</span>
            </div>
          </button>

          {open && (
            <div className="px-4 pb-4 border-t border-gray-50 pt-3">
              <div className="flex flex-wrap gap-2">
                {visibleTeams.map(team => (
                  <TeamPill key={team} name={team} sport={sport}
                    selected={selectedTeams.has(makeKey(team, sport))}
                    onToggle={() => onToggle(team, sport)} />
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    function MyTeamsPanel({ selectedTeams, onRemove }) {
      const teams = useMemo(() => [...selectedTeams].map(parseKey), [selectedTeams]);
      const football = teams.filter(t => t.sport === "football");
      const basketball = teams.filter(t => t.sport === "basketball");

      if (teams.length === 0) return (
        <div className="bg-white rounded-2xl border border-dashed border-gray-200 p-6 text-center">
          <p className="text-gray-400 text-sm">No teams tracked yet.</p>
          <p className="text-gray-300 text-xs mt-1">Tap a team below to add it.</p>
        </div>
      );

      function Group({ label, emoji, items, accentClass }) {
        if (items.length === 0) return null;
        return (
          <div>
            <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
              {emoji} {label}
            </p>
            <div className="flex flex-wrap gap-2">
              {items.map(({ name, sport }) => (
                <div key={makeKey(name, sport)}
                  className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-medium border ${accentClass}`}>
                  <span>{name}</span>
                  <button onClick={() => onRemove(name, sport)}
                    className="ml-0.5 text-current opacity-50 hover:opacity-100 leading-none text-base font-bold">
                    ×
                  </button>
                </div>
              ))}
            </div>
          </div>
        );
      }

      return (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 space-y-4">
          <Group label="Football" emoji="⚽" items={football}
            accentClass="bg-emerald-50 text-emerald-700 border-emerald-200" />
          <Group label="Basketball" emoji="🏀" items={basketball}
            accentClass="bg-orange-50 text-orange-700 border-orange-200" />
        </div>
      );
    }

    function SetupScreen() {
      return (
        <div className="min-h-screen flex items-center justify-center p-6 bg-gray-50">
          <div className="max-w-sm w-full bg-white rounded-3xl shadow-lg p-8 text-center">
            <div className="text-5xl mb-4">🔧</div>
            <h2 className="text-xl font-bold text-gray-900 mb-2">Firebase Setup Needed</h2>
            <p className="text-gray-500 text-sm mb-5 leading-relaxed">
              Open <code className="bg-gray-100 rounded px-1.5 py-0.5 text-xs font-mono">ui/index.html</code> in a
              text editor and fill in your Firebase project credentials in the{" "}
              <code className="bg-gray-100 rounded px-1.5 py-0.5 text-xs font-mono">FIREBASE_CONFIG</code> section.
            </p>
            <div className="text-left bg-slate-900 rounded-xl p-4 text-xs font-mono text-emerald-400 leading-relaxed">
              apiKey: "AIza..."<br />
              authDomain: "my-app.firebaseapp.com"<br />
              projectId: "my-app-12345"<br />
              storageBucket: "my-app.appspot.com"<br />
              messagingSenderId: "123456789"<br />
              appId: "1:123:web:abc"
            </div>
            <p className="text-gray-400 text-xs mt-4">See README.md for full instructions.</p>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // MAIN APP
    // ────────────────────────────────────────────────────────────────────────
    function App() {
      const [sport, setSport] = useState("football");
      const [selectedTeams, setSelectedTeams] = useState(new Set());
      const [searchQuery, setSearchQuery] = useState("");
      const [loadStatus, setLoadStatus] = useState("loading");  // loading | loaded | error
      const [saveStatus, setSaveStatus] = useState("idle");      // idle | saving | saved | error
      const [hasUnsaved, setHasUnsaved] = useState(false);
      const searchRef = useRef(null);

      // ── Load from Firebase ──────────────────────────────────────────────
      useEffect(() => {
        if (!IS_CONFIGURED) { setLoadStatus("loaded"); return; }
        db.collection("configs").doc(FIRESTORE_DOC).get()
          .then(doc => {
            if (doc.exists) {
              const data = doc.data();
              const teams = (data.teams || []).map(t => makeKey(t.name, t.sport));
              setSelectedTeams(new Set(teams));
            }
            setLoadStatus("loaded");
          })
          .catch(() => setLoadStatus("error"));
      }, []);

      // ── Toggle a team ───────────────────────────────────────────────────
      const toggleTeam = useCallback((name, sport) => {
        setSelectedTeams(prev => {
          const next = new Set(prev);
          const k = makeKey(name, sport);
          next.has(k) ? next.delete(k) : next.add(k);
          return next;
        });
        setHasUnsaved(true);
        setSaveStatus("idle");
      }, []);

      // ── Save to Firebase ────────────────────────────────────────────────
      const handleSave = async () => {
        if (!IS_CONFIGURED || saveStatus === "saving") return;
        setSaveStatus("saving");
        const teams = [...selectedTeams].map(key => {
          const { name, sport } = parseKey(key);
          return { name, sport, league: findLeague(name, sport) };
        });
        try {
          await db.collection("configs").doc(FIRESTORE_DOC).set({
            reminder_email: REMINDER_EMAIL,
            timezone_offset_hours: TIMEZONE_OFFSET,
            teams,
            updatedAt: new Date().toISOString()
          });
          setSaveStatus("saved");
          setHasUnsaved(false);
          setTimeout(() => setSaveStatus("idle"), 2500);
        } catch {
          setSaveStatus("error");
        }
      };

      // ── Filter leagues by search ────────────────────────────────────────
      const filteredLeagues = useMemo(() => {
        const q = searchQuery.trim().toLowerCase();
        return DATA[sport].leagues.map(league => ({
          ...league,
          _filtered: q ? league.teams.filter(t => t.toLowerCase().includes(q)) : null
        }));
      }, [sport, searchQuery]);

      const hasSearchResults = filteredLeagues.some(l => !l._filtered || l._filtered.length > 0);

      // ── Render ──────────────────────────────────────────────────────────
      if (!IS_CONFIGURED) return <SetupScreen />;

      const { accent } = DATA[sport];

      return (
        <div className="min-h-screen bg-gray-50 pb-8">

          {/* ── Sticky Header ── */}
          <header className="bg-slate-900 sticky top-0 z-20 shadow-xl">
            <div className="max-w-lg mx-auto px-4 pt-4 pb-3 space-y-3">

              {/* Title row */}
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <span className="text-xl">🏟️</span>
                  <h1 className="text-white font-bold text-lg tracking-tight">Sports Reminder</h1>
                  {selectedTeams.size > 0 && (
                    <span className="bg-slate-700 text-slate-300 text-xs font-semibold px-2 py-0.5 rounded-full">
                      {selectedTeams.size}
                    </span>
                  )}
                </div>
                <button onClick={handleSave}
                  disabled={saveStatus === "saving" || !hasUnsaved}
                  className={`px-4 py-1.5 rounded-xl text-sm font-semibold transition-all ${
                    saveStatus === "saved"
                      ? "bg-emerald-500 text-white"
                      : saveStatus === "error"
                      ? "bg-red-500 text-white"
                      : saveStatus === "saving"
                      ? "bg-slate-600 text-slate-400 cursor-not-allowed"
                      : hasUnsaved
                      ? "bg-blue-500 hover:bg-blue-400 text-white"
                      : "bg-slate-700 text-slate-500 cursor-not-allowed"
                  }`}>
                  {saveStatus === "saving" ? "Saving…"
                    : saveStatus === "saved" ? "✓ Saved"
                    : saveStatus === "error" ? "⚠ Error"
                    : "Save"}
                </button>
              </div>

              {/* Sport toggle */}
              <SportToggle sport={sport} onChange={s => { setSport(s); setSearchQuery(""); }} />
            </div>
          </header>

          {/* ── Main Content ── */}
          <main className="max-w-lg mx-auto px-4 pt-4 space-y-3">

            {loadStatus === "loading" && (
              <div className="text-center py-20 text-gray-400 text-sm">Loading your teams…</div>
            )}

            {loadStatus === "error" && (
              <div className="text-center py-20 text-red-400 text-sm">
                Could not load data. Check your Firebase config.
              </div>
            )}

            {loadStatus === "loaded" && (
              <>
                {/* My Teams */}
                <div>
                  <h2 className="text-xs font-semibold text-gray-400 uppercase tracking-wider px-1 mb-2">
                    My Teams
                  </h2>
                  <MyTeamsPanel selectedTeams={selectedTeams} onRemove={toggleTeam} />
                </div>

                {/* Search */}
                <div className="relative">
                  <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm">🔍</span>
                  <input ref={searchRef} type="search" placeholder="Search teams…"
                    value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                    className={`w-full pl-9 pr-10 py-3 bg-white border border-gray-200 rounded-xl text-sm
                      focus:outline-none focus:ring-2 ${accent.ring} focus:border-transparent
                      placeholder:text-gray-400`} />
                  {searchQuery && (
                    <button onClick={() => setSearchQuery("")}
                      className="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg font-light">
                      ×
                    </button>
                  )}
                </div>

                {/* Leagues */}
                <div>
                  <h2 className="text-xs font-semibold text-gray-400 uppercase tracking-wider px-1 mb-2">
                    {DATA[sport].emoji} {DATA[sport].label} Leagues
                  </h2>
                  {!hasSearchResults ? (
                    <div className="text-center py-10 text-gray-400 text-sm">
                      No teams found for "{searchQuery}"
                    </div>
                  ) : (
                    <div className="space-y-2">
                      {filteredLeagues.map(league => (
                        <LeagueSection key={league.id} league={league} sport={sport}
                          selectedTeams={selectedTeams} onToggle={toggleTeam}
                          forceOpen={!!searchQuery && (!league._filtered || league._filtered.length > 0)} />
                      ))}
                    </div>
                  )}
                </div>
              </>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
